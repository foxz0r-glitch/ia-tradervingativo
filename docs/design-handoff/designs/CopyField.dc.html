<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative; border-radius:14px; padding:13px 15px; background:rgba(6,12,8,.5); border:1px solid {{ borderColor }}; display:flex; align-items:center; gap:13px; font-family:'Sora',sans-serif; transition:border-color .2s;">
  <span style="width:38px; height:38px; flex:none; border-radius:10px; background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.26); display:flex; align-items:center; justify-content:center; color:#34d77a;">
    <sc-if value="{{ isEmail }}" hint-placeholder-val="{{ true }}"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"></rect><path d="M4 7l8 5.5L20 7"></path></svg></sc-if>
    <sc-if value="{{ isLock }}" hint-placeholder-val="{{ false }}"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="10.5" width="15" height="10" rx="2.5"></rect><path d="M8 10.5V7.5a4 4 0 0 1 8 0v3"></path></svg></sc-if>
  </span>
  <div style="flex:1; min-width:0;">
    <div style="font:600 9px 'Sora'; letter-spacing:.16em; color:#5d7167; text-transform:uppercase;">{{ label }}</div>
    <div style="font:600 15px 'JetBrains Mono'; color:#eef5f0; margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">{{ display }}</div>
  </div>
  <sc-if value="{{ masked }}" hint-placeholder-val="{{ false }}">
    <button onClick="{{ toggleEye }}" style="width:34px; height:34px; flex:none; border:none; border-radius:9px; background:rgba(255,255,255,.04); color:#86a596; cursor:pointer; display:flex; align-items:center; justify-content:center;">
      <sc-if value="{{ hidden }}" hint-placeholder-val="{{ true }}"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="2.6"></circle></svg></sc-if>
      <sc-if value="{{ shown }}" hint-placeholder-val="{{ false }}"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7c2 0 3.7.6 5.2 1.5M22 12s-3.5 7-10 7c-2 0-3.7-.6-5.2-1.5"></path><path d="M4 4l16 16"></path></svg></sc-if>
    </button>
  </sc-if>
  <button onClick="{{ doCopy }}" style="height:34px; flex:none; padding:0 11px; border:1px solid {{ btnBorder }}; border-radius:9px; background:{{ btnBg }}; color:{{ btnColor }}; cursor:pointer; display:flex; align-items:center; gap:6px; font:700 10px 'Sora'; letter-spacing:.06em; transition:all .2s;">
    <sc-if value="{{ copied }}" hint-placeholder-val="{{ false }}"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7.5"></path></svg>Copiado</sc-if>
    <sc-if value="{{ notCopied }}" hint-placeholder-val="{{ true }}"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2.5"></rect><path d="M5 15V5a2 2 0 0 1 2-2h8"></path></svg>Copiar</sc-if>
  </button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:380,&quot;height&quot;:70},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;E-mail&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;value&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;usuario@email.com&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;masked&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;kind&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;email&quot;,&quot;lock&quot;],&quot;default&quot;:&quot;email&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { copied: false, revealed: false };

  renderVals() {
    const value = this.props.value || '';
    const masked = !!this.props.masked;
    const kind = this.props.kind || 'email';
    const hidden = masked && !this.state.revealed;
    return {
      label: this.props.label || '',
      display: hidden ? '•'.repeat(Math.max(8, Math.min(value.length, 14))) : value,
      masked, hidden, shown: !hidden,
      isEmail: kind === 'email', isLock: kind === 'lock',
      copied: this.state.copied, notCopied: !this.state.copied,
      borderColor: this.state.copied ? 'rgba(34,197,94,.5)' : 'rgba(34,197,94,.18)',
      btnBorder: this.state.copied ? 'rgba(34,197,94,.5)' : 'rgba(255,255,255,.1)',
      btnBg: this.state.copied ? 'rgba(34,197,94,.16)' : 'rgba(255,255,255,.03)',
      btnColor: this.state.copied ? '#5dffa0' : '#9bb0a5',
      toggleEye: () => this.setState({ revealed: !this.state.revealed }),
      doCopy: () => {
        try { if (navigator.clipboard) navigator.clipboard.writeText(value); } catch (e) {}
        clearTimeout(this._t);
        this.setState({ copied: true });
        this._t = setTimeout(() => this.setState({ copied: false }), 1600);
      },
    };
  }
}
</script>
</body>
</html>
