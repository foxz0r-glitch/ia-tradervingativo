<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
</helmet>
<div style="width:100%; height:100%; display:flex; flex-direction:column; padding:20px 16px 18px; background:rgba(6,12,8,.72); border-right:1px solid rgba(34,197,94,.12); font-family:'Sora',sans-serif;">
  <!-- brand + collapse -->
  <div style="display:flex; align-items:center; justify-content:space-between; padding:0 6px;">
    <div style="display:flex; align-items:center; gap:10px;">
      <svg viewBox="0 0 100 100" style="width:26px; height:26px; filter:drop-shadow(0 0 5px rgba(26,230,92,.6));"><path d="M11 17 L37 17 L50 49 L63 17 L89 17 L50 86 Z" fill="#1AE65C"></path></svg>
      <div style="line-height:1;"><div style="font:600 8px 'Sora'; letter-spacing:.22em; color:#5d8a70;">IA</div><div style="font:800 15px 'Sora'; color:#eef5f0; letter-spacing:.02em;">VINGATIVA</div></div>
    </div>
    <button style="width:30px;height:30px;border-radius:9px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);color:#86a596;cursor:pointer;display:flex;align-items:center;justify-content:center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 6l-6 6 6 6"></path><path d="M19 6l-6 6 6 6"></path></svg></button>
  </div>

  <div style="display:flex; align-items:center; gap:8px; padding:22px 8px 12px;"><span style="font:700 9px 'Sora'; letter-spacing:.24em; color:#4e6b59; text-transform:uppercase;">Painel</span><span style="flex:1; height:1px; background:linear-gradient(90deg,rgba(34,197,94,.2),transparent);"></span></div>

  <!-- nav -->
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="display:flex; align-items:center; gap:13px; padding:12px 13px; border-radius:13px; background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.4); box-shadow:0 0 22px -10px rgba(34,197,94,.8); cursor:pointer;">
      <span style="color:#34d77a; display:flex;"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="8" width="16" height="11" rx="3.5"></rect><path d="M12 4.8v3.2"></path><circle cx="12" cy="3.6" r="1.2" fill="currentColor" stroke="none"></circle><circle cx="9" cy="13" r="1.1" fill="currentColor" stroke="none"></circle><circle cx="15" cy="13" r="1.1" fill="currentColor" stroke="none"></circle><path d="M9.6 16.3h4.8"></path><path d="M2.6 12v2.4M21.4 12v2.4"></path></svg></span>
      <span style="flex:1; font:700 14px 'Sora'; color:#eef5f0;">IA Vingativa</span>
      <span style="font:700 8px 'Sora'; letter-spacing:.12em; color:#34d77a; padding:3px 8px; border-radius:20px; border:1px solid rgba(34,197,94,.45); background:rgba(34,197,94,.12);">ON</span>
    </div>
    <div style="display:flex; align-items:center; gap:13px; padding:12px 13px; border-radius:13px; cursor:pointer;">
      <span style="color:#7d9488; display:flex;"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4.5h10V9a5 5 0 0 1-10 0V4.5z"></path><path d="M7 6.4H4.6v1.4A2.8 2.8 0 0 0 7 10.6"></path><path d="M17 6.4h2.4v1.4A2.8 2.8 0 0 1 17 10.6"></path><path d="M12 14v3.4"></path><path d="M9 20h6M9.7 20l.5-2.6h3.6l.5 2.6"></path></svg></span>
      <span style="flex:1; font:700 14px 'Sora'; color:#c2d2c9;">Ranking</span>
    </div>
    <div style="display:flex; align-items:center; gap:13px; padding:12px 13px; border-radius:13px; cursor:pointer;">
      <span style="color:#7d9488; display:flex;"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"></circle><path d="M3.5 19c0-3 2.4-5 5.5-5s5.5 2 5.5 5"></path><path d="M16 6.3a3 3 0 0 1 0 5.4"></path><path d="M17.6 14.3c2.1.5 3.9 2.3 3.9 4.7"></path></svg></span>
      <span style="flex:1; font:700 14px 'Sora'; color:#c2d2c9;">Grupo VIP</span>
      <span style="color:#5d8a70; display:flex;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"></path><path d="M8 7h9v9"></path></svg></span>
    </div>
  </div>

  <div style="flex:1; min-height:14px;"></div>

  <!-- footer -->
  <div style="display:flex; flex-direction:column; gap:10px;">
    <!-- rank -->
    <div style="border-radius:14px; padding:13px; background:linear-gradient(120deg, rgba(255,255,255,.05), rgba(255,255,255,.015)); border:1px solid rgba(255,255,255,.08);">
      <div style="display:flex; align-items:center; gap:10px;">
        <span style="display:flex;align-items:center;justify-content:center;flex:none;"><img src="assets/ranks/prata-1.svg" style="height:26px;width:auto;display:block;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5));"></span>
        <div style="flex:1; min-width:0;"><div style="font:600 8px 'Sora'; letter-spacing:.18em; color:#7d8a84; text-transform:uppercase;">Rank</div><div style="font:700 14px 'Sora'; color:#eef5f0; white-space:nowrap;">Prata I</div></div>
        <sc-if value="{{ showStreak }}" hint-placeholder-val="{{ true }}"><span style="display:inline-flex; align-items:center; gap:5px; font:700 9px 'Sora'; letter-spacing:.04em; color:#ff9a52; padding:3px 9px; border-radius:20px; border:1px solid rgba(255,138,60,.38); background:rgba(255,138,60,.12); flex:none; white-space:nowrap;"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"></path></svg>{{ streakText }}</span></sc-if>
      </div>
      <div style="height:5px; border-radius:3px; background:rgba(255,255,255,.08); margin-top:12px; overflow:hidden;"><div style="width:18%; height:100%; border-radius:3px; background:linear-gradient(90deg,#9aa6b2,#e6edf3);"></div></div>
      <div style="font:500 9px 'JetBrains Mono'; color:#7d8a84; margin-top:7px;">Próximo: Prata II · 490 pts</div>
    </div>
    <!-- plan (clickable) -->
    <div style="display:flex; align-items:center; gap:12px; padding:13px; border-radius:14px; cursor:pointer; background:rgba(34,197,94,.07); border:1px solid rgba(34,197,94,.32); box-shadow:0 0 22px -12px rgba(34,197,94,.7);">
      <span style="width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);color:#34d77a;"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 3L5 13h6l-1 8 8-10h-6l1-8z"></path></svg></span>
      <div style="flex:1;"><div style="font:600 8px 'Sora'; letter-spacing:.18em; color:#5d8a70; text-transform:uppercase;">Plano atual</div><div style="font:700 14px 'Sora'; color:#eef5f0;">Free</div></div>
      <span style="font:700 9px 'Sora'; letter-spacing:.06em; color:#34d77a;">VER PLANOS</span>
      <span style="color:#34d77a; display:flex;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"></path></svg></span>
    </div>
    <!-- suporte -->
    <div style="display:flex; align-items:center; gap:12px; padding:11px 13px; border-radius:13px; cursor:pointer;">
      <span style="color:#86a596; display:flex;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 13v-1a8 8 0 0 1 16 0v1"></path><rect x="2.5" y="13" width="4.2" height="6.5" rx="1.6"></rect><rect x="17.3" y="13" width="4.2" height="6.5" rx="1.6"></rect><path d="M20.5 19.5a3.5 3.5 0 0 1-3.5 3h-2"></path></svg></span>
      <div style="flex:1;"><div style="font:700 13px 'Sora'; color:#c2d2c9;">Suporte</div><div style="font:500 10px 'Sora'; color:#7d9488;">Estamos online</div></div>
      <span style="width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px #22c55e;"></span>
    </div>
    <!-- sair -->
    <div style="display:flex; align-items:center; gap:13px; padding:11px 13px; border-radius:13px; cursor:pointer;">
      <span style="color:#c07a72; display:flex;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 4h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-3"></path><path d="M10 17l-5-5 5-5"></path><path d="M5 12h12"></path></svg></span>
      <span style="flex:1; font:700 13px 'Sora'; color:#c98f88;">Sair</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:264,&quot;height&quot;:640},&quot;streak&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:18,&quot;tsType&quot;:&quot;number&quot;}}">class Component extends DCLogic {
  renderVals() {
    const s = this.props.streak ?? 18;
    return { showStreak: s >= 3, streakText: s + 'd' };
  }
}</script>
</body>
</html>
