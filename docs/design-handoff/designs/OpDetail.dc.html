<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
</helmet>
<div style="width:100%; font-family:'Sora',sans-serif;">
  <div style="display:flex; align-items:center; justify-content:space-between;">
    <div style="display:flex; align-items:center; gap:10px;"><span style="font:700 19px 'Sora'; color:#eef5f0;">{{ pair }}</span><span style="font:700 9px 'Sora'; letter-spacing:.12em; padding:4px 10px; border-radius:6px; background:{{ badgeBg }}; color:{{ badgeColor }};">{{ badge }}</span></div>
    <button onClick="{{ onClose }}" style="width:34px; height:34px; border-radius:10px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.03); color:#9bb0a5; cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center;">✕</button>
  </div>
  <div style="text-align:center; padding:24px 0 6px;">
    <div style="font:600 10px 'Sora'; letter-spacing:.22em; color:#5d8a70; text-transform:uppercase;">Payout da operação</div>
    <div style="font:700 46px 'JetBrains Mono'; color:{{ amountColor }}; line-height:1.05; margin-top:8px; text-shadow:0 0 30px rgba(34,197,94,.35);">{{ amountText }}</div>
    <div style="font:600 13px 'JetBrains Mono'; color:#7d9488; margin-top:5px;">{{ pctText }}</div>
  </div>
  <div style="margin-top:16px; border-top:1px solid rgba(34,197,94,.12);">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:13px 2px; border-bottom:1px solid rgba(255,255,255,.04);"><span style="font:600 10px 'Sora'; letter-spacing:.14em; color:#7d9488; text-transform:uppercase;">Entrada</span><span style="font:700 13px 'JetBrains Mono'; color:#dfeae3;">{{ openT }}</span></div>
    <div style="display:flex; justify-content:space-between; align-items:center; padding:13px 2px; border-bottom:1px solid rgba(255,255,255,.04);"><span style="font:600 10px 'Sora'; letter-spacing:.14em; color:#7d9488; text-transform:uppercase;">Saída</span><span style="font:700 13px 'JetBrains Mono'; color:#dfeae3;">{{ closeT }}</span></div>
    <div style="display:flex; justify-content:space-between; align-items:center; padding:13px 2px;"><span style="font:600 10px 'Sora'; letter-spacing:.14em; color:#7d9488; text-transform:uppercase;">Data</span><span style="font:700 13px 'JetBrains Mono'; color:#dfeae3;">{{ date }}</span></div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:360},
 &quot;pair&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;EUR/USD&quot;,&quot;tsType&quot;:&quot;string&quot;},
 &quot;badge&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;WIN&quot;,&quot;tsType&quot;:&quot;string&quot;},
 &quot;badgeColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#4ade80&quot;,&quot;tsType&quot;:&quot;string&quot;},
 &quot;badgeBg&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;rgba(34,197,94,.14)&quot;,&quot;tsType&quot;:&quot;string&quot;},
 &quot;amountText&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;+$ 124,96&quot;,&quot;tsType&quot;:&quot;string&quot;},
 &quot;amountColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#34d77a&quot;,&quot;tsType&quot;:&quot;string&quot;},
 &quot;pctText&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;+88%&quot;,&quot;tsType&quot;:&quot;string&quot;},
 &quot;openT&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;00:13:40&quot;,&quot;tsType&quot;:&quot;string&quot;},
 &quot;closeT&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;00:14:40&quot;,&quot;tsType&quot;:&quot;string&quot;},
 &quot;date&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;18 Jun&quot;,&quot;tsType&quot;:&quot;string&quot;},
 &quot;onClose&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}"></script>
</body>
</html>
